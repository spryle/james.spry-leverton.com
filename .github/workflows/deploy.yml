name: Deploy

on:
    push:
        branches: [master]
    workflow_dispatch:

# Required for OIDC auth to AWS (no long-lived access keys).
permissions:
    id-token: write
    contents: read

# Opt in to Node.js 24 for JavaScript actions ahead of the June 2026 default.
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            AWS_REGION: us-east-1
            S3_BUCKET: ${{ vars.S3_BUCKET }}
            CF_DISTRIBUTION_ID: ${{ vars.CF_DISTRIBUTION_ID }}
        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ vars.AWS_ROLE_ARN }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Sync immutable assets (long cache)
              run: |
                  aws s3 sync ./assets "s3://${S3_BUCKET}/assets" \
                    --delete \
                    --cache-control "public,max-age=31536000,immutable"

            - name: Upload HTML / CSS / JS (short cache)
              run: |
                  for f in index.html style.css wallpaper.js manifest.json sitemap.xml robots.txt; do
                    aws s3 cp "$f" "s3://${S3_BUCKET}/$f" \
                      --cache-control "public,max-age=300,must-revalidate"
                  done

            - name: Invalidate CloudFront
              run: |
                  aws cloudfront create-invalidation \
                    --distribution-id "${CF_DISTRIBUTION_ID}" \
                    --paths "/index.html" "/style.css" "/wallpaper.js" \
                            "/manifest.json" "/sitemap.xml" "/robots.txt"
